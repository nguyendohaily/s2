<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
       
    <center>
    <h1><i>My Store</i></h1>
    <table border="1">
        <thead>
            <tr align="center">
                <th>Item Photo</th>
                <th>Name</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr align="center">
                <td><img src="https://cdn2.fptshop.com.vn/unsafe/2024_1_18_638412130889732652_cach-chon-cam-ngon-ngot-mong-nuoc-sieu-don-gian-ma-khong-phai-ai-cung-biet2.jpg" alt="Orangea" width="150"></td>
                <td>Oranges</td>
                <td>$1 ea.</td>
            </tr>
            <tr align="center">
                <td><img src="item2.jpg" alt="Bananas" width="20" height="20"></td>
                <td>Bananas</td>
                <td>$0.75/lb</td>
            </tr>
            <tr align="center">
                <td><img src="https://suckhoedoisong.qltns.mediacdn.vn/324455921873985536/2024/9/15/photo-1726371462747-17263714634751113134340.jpeg" alt="Pomegranates" width="150"></td>
                <td>Pomegranates</td>
                <td>3 for $5</td>
            </tr>
            <tr align="center">
                <td><img src="item4.jpg" alt="Gummy Bears" width="20" height="20"></td>
                <td>Gummy Bears</td>
                <td>$6 per bag</td>
            </tr>
            <tr align="center" >
                <td><img src="https://cdn2.fptshop.com.vn/unsafe/1920x0/filters:format(webp):quality(75)/sup_lo_xanh_ky_voi_gi_c4302beae7.jpg" alt="Broccoli" width="150"></td>
                <td>Broccoli</td>
                <td>$3 a head</td>
            </tr>
        </tbody>
    </table>
    </center>
    </section>

    <section>
        <h2>Booking Form</h2>
        <form action="">
            <p>
                <label>Name:</label>
                <input type="text" />
            </p>
            <p>
                <label>Email:</label>
                <input type="email" />
            </p>
            <p>
                <label>Phone:</label>
                <input type="tel" />
            </p>
            <p>
                <label>Date:</label>
                <!--cái icon cuốn lịch thì làm ntn ạ? -->
                <input type="date" placeholder="mm/dd/yyyy" />
            </p>
            <p>
                <label>Time:</label>
                <input type="time" />
            </p>
            <p>
                <label>Number of Guests:</label>
                <input type="number" name="guest" min="1" />
            </p>
            <p>
                <button type="submit">Submit</button>
            </p>
        </form>
    </section>

    <section>
        <h2>Car Purcharse Form</h2>
        <form action="">
            <p>
                <label>Name:</label>
                <input type="text" />
            </p>
            <p>
                <label>Email:</label>
                <input type="email" />
            </p>
            <p>
                <label>Phone:</label>
                <input type="tel" />
            </p>
            <p>
                <label>Choose a Car:</label>
                <select name="car">
                    <option value="model1">Model 1</option>
                    <option value="model2">Model 2</option>
                    <option value="model3">Model 3</option>
                </select>
            </p>    
            <p>
                <label>Choose a Color:</label>
                <select name="color">
                    <option value="red">Red</option>
                    <option value="blue">Blue</option>
                    <option value="black">Black</option>
                </select>
            </p>
            <p>
                <label>Quantity:</label>
                <input type="text" name="quantity" />
            </p>
            <p>
                <label>Delivery Date:</label>
                <input type="date" placeholder="mm/dd/yyyy" />
            </p>
            <p>
                <button type="submit">Submit</button>
            </p>
        </form>
    </section>
</body>
</html>
